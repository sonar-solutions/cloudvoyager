name: Build Desktop Apps

on:
  workflow_call:

jobs:
  build-desktop-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Sync desktop version from root package.json
        run: node -e "const p='desktop/package.json',d=require('./'+p);d.version=require('./package.json').version;require('fs').writeFileSync(p,JSON.stringify(d,null,2)+'\n')"
      - name: Restore CLI binary from cache
        uses: actions/cache/restore@v4
        with:
          path: dist/bin/cloudvoyager-linux-x64
          key: cli-binary-linux-x64-${{ github.sha }}
      - name: Copy CLI binary to desktop resources
        run: mkdir -p desktop/resources/cli && cp dist/bin/cloudvoyager-linux-x64 desktop/resources/cli/
      - name: Make binary executable
        run: chmod +x desktop/resources/cli/cloudvoyager-linux-x64
      - name: Install desktop dependencies
        run: cd desktop && npm ci
      - name: Build desktop app (linux-x64)
        run: cd desktop && npm run build:linux-x64
      - name: Save desktop artifact to cache
        uses: actions/cache/save@v4
        with:
          path: dist/desktop/
          key: desktop-binary-linux-x64-${{ github.sha }}

  build-desktop-linux-arm64:
