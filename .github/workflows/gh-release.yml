name: Create GitHub Release

on:
  workflow_call:
    inputs:
      tag:
        description: The release tag name
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract milestone from package.json
        id: milestone
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          MILESTONE=$(echo "$VERSION" | cut -d. -f1,2)
          MILESTONE_NUMBER=$(gh api repos/${{ github.repository }}/milestones --jq ".[] | select(.title==\"$MILESTONE\") | .number" || echo "")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "milestone=$MILESTONE" >> "$GITHUB_OUTPUT"
          echo "milestone_number=$MILESTONE_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: cloudvoyager-*
          path: dist/bin
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: CloudVoyager ${{ inputs.tag }}
          generate_release_notes: true
          body: |
            ## Milestone ${{ steps.milestone.outputs.milestone }}

            This release is part of the **[${{ steps.milestone.outputs.milestone }} milestone](https://github.com/${{ github.repository }}/milestone/${{ steps.milestone.outputs.milestone_number }})**.

            Full version: `${{ steps.milestone.outputs.version }}`

            ---
          files: dist/bin/*
