name: Build Binaries

on:
  workflow_call:
    outputs:
      tag:
        description: The generated release tag
        value: ${{ jobs.tag.outputs.tag }}

jobs:
  # Build Node.js SEA binaries — one job per platform (default, stable)
  build-sea-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-linux-x64-${{ hashFiles('package-lock.json') }}
      - run: npm ci
      - name: Build linux-x64 binary via Node.js SEA
        run: npm run package
      - name: Save linux-x64 binary to cache
        uses: actions/cache/save@v4
        with:
          path: dist/bin/cloudvoyager-linux-x64
          key: cli-binary-linux-x64-${{ github.sha }}

  build-sea-linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-linux-arm64-${{ hashFiles('package-lock.json') }}
      - run: npm ci
      - name: Build linux-arm64 binary via Node.js SEA
        run: npm run package
      - name: Save linux-arm64 binary to cache
        uses: actions/cache/save@v4
        with:
          path: dist/bin/cloudvoyager-linux-arm64
          key: cli-binary-linux-arm64-${{ github.sha }}

  build-sea-macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-macos-arm64-${{ hashFiles('package-lock.json') }}
      - run: npm ci
      - name: Build macos-arm64 binary via Node.js SEA
        run: npm run package
      - name: Save macos-arm64 binary to cache
        uses: actions/cache/save@v4
        with:
          path: dist/bin/cloudvoyager-macos-arm64
          key: cli-binary-macos-arm64-${{ github.sha }}

  build-sea-macos-x64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-macos-x64-${{ hashFiles('package-lock.json') }}
      - run: npm ci
      - name: Build macos-x64 binary via Node.js SEA (cross-compile)
        run: node scripts/build.js --package --target=macos-x64
      - name: Save macos-x64 binary to cache
        uses: actions/cache/save@v4
        with:
          path: dist/bin/cloudvoyager-macos-x64
          key: cli-binary-macos-x64-${{ github.sha }}

  build-sea-win-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-win-x64-${{ hashFiles('package-lock.json') }}
      - run: npm ci
      - name: Build win-x64 binary via Node.js SEA
        run: npm run package
      - name: Save win-x64 binary to cache
        uses: actions/cache/save@v4
        with:
          path: dist/bin/cloudvoyager-win-x64.exe
          key: cli-binary-win-x64-${{ github.sha }}

  build-sea-win-arm64:
    runs-on: windows-11-arm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-win-arm64-${{ hashFiles('package-lock.json') }}
      - run: npm ci
      - name: Build win-arm64 binary via Node.js SEA
        run: npm run package
      - name: Save win-arm64 binary to cache
        uses: actions/cache/save@v4
        with:
          path: dist/bin/cloudvoyager-win-arm64.exe
          key: cli-binary-win-arm64-${{ github.sha }}

  tag:
    needs: [build-sea-linux-x64, build-sea-linux-arm64, build-sea-macos-arm64, build-sea-macos-x64, build-sea-win-x64, build-sea-win-arm64]
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate release tag
        id: tag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}-$(date +'%Y%m%d%H%M%S')"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
