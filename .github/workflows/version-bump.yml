# -------- Workflow: Auto Version Bump --------
# On PR merge, reads the milestone from the PR and bumps the patch version.
# e.g. milestone "1.2" + current 1.2.1 → bumps to 1.2.2
# e.g. milestone "1.3" + current 1.2.5 → sets to 1.3.0

name: Auto Version Bump

# -------- Triggers --------
on:
  pull_request:
    types: [closed]
    branches: [main]

# -------- Permissions --------
permissions:
  contents: write

# -------- Jobs --------
jobs:
  version-bump:
    name: Bump Version from Milestone
    if: github.event.pull_request.merged == true && github.event.pull_request.milestone != null
    runs-on: ubuntu-latest

    steps:
      # -------- Checkout --------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      # -------- Compute New Version --------
      - name: Compute new version from milestone
        id: version
        run: |
          MILESTONE="${{ github.event.pull_request.milestone.title }}"
          CURRENT=$(node -p "require('./package.json').version")
          CURRENT_MAJOR_MINOR=$(echo "$CURRENT" | cut -d. -f1,2)
          CURRENT_PATCH=$(echo "$CURRENT" | cut -d. -f3)

          if [ "$MILESTONE" = "$CURRENT_MAJOR_MINOR" ]; then
            NEW_PATCH=$((CURRENT_PATCH + 1))
            NEW_VERSION="${MILESTONE}.${NEW_PATCH}"
          else
            NEW_VERSION="${MILESTONE}.0"
          fi

          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "new=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumping $CURRENT → $NEW_VERSION (milestone: $MILESTONE)"

      # -------- Update package.json --------
      - name: Update package.json version
        run: npm version ${{ steps.version.outputs.new }} --no-git-tag-version

      # -------- Sync version to desktop/package.json --------
      - name: Update desktop/package.json version
        run: |
          cd desktop
          npm version ${{ steps.version.outputs.new }} --no-git-tag-version

      # -------- Commit and Push --------
      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json desktop/package.json desktop/package-lock.json
          git commit -m "chore: bump version to ${{ steps.version.outputs.new }}"
          git push
